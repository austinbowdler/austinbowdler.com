<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ab-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fcbd3"/>
      <stop offset="45%" stop-color="#66aebf"/>
      <stop offset="100%" stop-color="#438ca4"/>
    </linearGradient>
    <linearGradient id="ab-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66aebf"/>
      <stop offset="55%" stop-color="#438ca4"/>
      <stop offset="100%" stop-color="#2b5d66"/>
    </linearGradient>
    <style>
      .bg { fill: url(#ab-grad-light); }
      .fg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: url(#ab-grad-dark); }
        .fg { fill: #f1f5f9; }
      }
    </style>
  </defs>
  <rect class="bg" width="512" height="512" rx="112" ry="112"/>
  <text class="fg"
        x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="300"
        letter-spacing="-14">ab</text>
</svg>
